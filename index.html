<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Brand Diagnostic — Ascend Content</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #b59e5f;
      --yellow-dark: #8b7a45;
      --black: #04070d;
      --white: #ffffff;
      --off-white: #04070d;
      --gray-100: #0d0a07;
      --gray-200: #35281e;
      --gray-400: rgba(255,255,255,0.35);
      --gray-600: rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--off-white);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 28px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
    }

    /* ── Headline ── */
    .headline {
      font-size: clamp(52px, 10vw, 88px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--white);
      margin-bottom: 28px;
    }

    .headline .accent {
      color: var(--yellow);
      display: block;
    }

    /* ── Description ── */
    .desc {
      font-size: clamp(16px, 2.5vw, 19px);
      font-weight: 400;
      line-height: 1.6;
      color: var(--gray-600);
      max-width: 480px;
      margin-bottom: 40px;
    }

    /* ── CTA Button ── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #b59e5f 0%, #d4c08a 50%, #8b7a45 100%);
      box-shadow: 0 4px 20px rgba(181,158,95,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      color: #0a0a0a;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      padding: 18px 40px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.1s;
      text-decoration: none;
      margin-bottom: 48px;
    }

    .cta-btn:hover {
      box-shadow: 0 6px 24px rgba(181,158,95,0.45);
    }

    .cta-btn:active {
      transform: scale(0.98);
    }

    .cta-arrow {
      font-size: 20px;
      transition: transform 0.15s;
    }

    .cta-btn:hover .cta-arrow {
      transform: translateX(3px);
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--gray-200);
      margin-bottom: 32px;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 40px;
      margin-bottom: 32px;
      width: 100%;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--white);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    /* ── Footer note ── */
    .footer-note {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .stats { gap: 24px; }
      .stat-value { font-size: 22px; }
      .cta-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- Badge -->
      <div class="badge">
        <span class="badge-dot"></span>
        Free Brand Diagnostic
      </div>

      <!-- Headline -->
      <h1 class="headline">
        How strong is
        <span class="accent">your brand?</span>
      </h1>

      <!-- Description -->
      <p class="desc">
        Score your personal brand across 6 dimensions in 60 seconds. See exactly where you're winning and where you're leaving money on the table.
      </p>

      <!-- CTA -->
      <a href="quiz.html" class="cta-btn" id="start-btn">
        Get Your Score <span class="cta-arrow">→</span>
      </a>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <span class="stat-value">14,000+</span>
          <span class="stat-label">Founders Scored</span>
        </div>
        <div class="stat">
          <span class="stat-value">60 sec</span>
          <span class="stat-label">To Complete</span>
        </div>
        <div class="stat">
          <span class="stat-value">6</span>
          <span class="stat-label">Dimensions</span>
        </div>
      </div>

      <!-- Footer -->
      <p class="footer-note">Free &middot; Takes 60 seconds</p>

    </div>
  </div>
</body>
</html>
