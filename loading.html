<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Building Your Results — Ascend Content</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #b59e5f;
      --yellow-dark: #8b7a45;
      --black: #04070d;
      --white: #ffffff;
      --off-white: #04070d;
      --gray-100: #0d0a07;
      --gray-200: #35281e;
      --gray-400: rgba(255,255,255,0.35);
      --gray-600: rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--off-white);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── Icon ── */
    .icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #b59e5f 0%, #d4c08a 50%, #8b7a45 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      font-size: 32px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(181,158,95,0.4); }
      50%       { transform: scale(1.04); box-shadow: 0 0 0 12px rgba(181,158,95,0); }
    }

    /* ── Headline ── */
    .headline {
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--white);
      margin-bottom: 10px;
    }

    .subline {
      font-size: 15px;
      color: var(--gray-600);
      font-weight: 400;
      margin-bottom: 44px;
    }

    /* ── Big % number ── */
    .pct-display {
      font-size: clamp(56px, 12vw, 88px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--white);
      margin-bottom: 20px;
      transition: color 0.3s;
    }

    .pct-display span {
      font-size: 0.45em;
      font-weight: 700;
      opacity: 0.4;
      vertical-align: super;
    }

    /* ── Progress track ── */
    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--gray-200);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 40px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--yellow);
      border-radius: 100px;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Steps ── */
    .steps {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: var(--gray-100);
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-400);
      transition: border-color 0.3s, color 0.3s, background 0.3s;
      opacity: 0.5;
    }

    .step.active {
      border-color: var(--yellow);
      background: rgba(181,158,95,0.12);
      color: var(--white);
      opacity: 1;
    }

    .step.done {
      border-color: var(--gray-200);
      background: var(--gray-100);
      color: var(--white);
      opacity: 1;
    }

    .step-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .step.active .step-icon {
      background: var(--yellow);
      animation: spin-subtle 1.2s linear infinite;
    }

    .step.done .step-icon {
      background: var(--yellow);
      color: #0a0a0a;
      animation: none;
    }

    @keyframes spin-subtle {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @media (max-width: 480px) {
      .pct-display { font-size: 64px; }
      .step { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <div class="icon-wrap">⚡</div>
      <h1 class="headline">Building your brand report</h1>
      <p class="subline">Analyzing your answers across every dimension…</p>

      <div class="pct-display" id="pct-display">0<span>%</span></div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="steps" id="steps">
        <div class="step" id="s1">
          <div class="step-icon" id="si1">→</div>
          <span>Scoring brand clarity</span>
        </div>
        <div class="step" id="s2">
          <div class="step-icon" id="si2">→</div>
          <span>Evaluating content system</span>
        </div>
        <div class="step" id="s3">
          <div class="step-icon" id="si3">→</div>
          <span>Calculating revenue potential</span>
        </div>
        <div class="step" id="s4">
          <div class="step-icon" id="si4">→</div>
          <span>Analyzing offer clarity</span>
        </div>
        <div class="step" id="s5">
          <div class="step-icon" id="si5">→</div>
          <span>Measuring authority signals</span>
        </div>
        <div class="step" id="s6">
          <div class="step-icon" id="si6">→</div>
          <span>Identifying your bottleneck</span>
        </div>
        <div class="step" id="s7">
          <div class="step-icon" id="si7">→</div>
          <span>Writing personalized recommendations</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const score  = params.get('score') || '0';
    const raw    = params.get('raw')   || '0';
    const max    = params.get('max')   || '0';
    const name   = params.get('name')  || '';

    const STEPS = 7;
    // Each step activates at these % thresholds
    const STEP_AT  = [5, 20, 35, 50, 63, 76, 88];
    const STEP_DONE = [18, 33, 48, 61, 74, 86, 97];

    let current = 0; // 0–100
    let stepsDone = new Array(STEPS).fill(false);
    let stepsActive = new Array(STEPS).fill(false);

    function setStep(i, state) {
      const el   = document.getElementById('s'  + (i + 1));
      const icon = document.getElementById('si' + (i + 1));
      el.classList.remove('active', 'done');
      if (state === 'active') {
        el.classList.add('active');
        icon.textContent = '◎';
      } else if (state === 'done') {
        el.classList.add('done');
        icon.textContent = '✓';
      }
    }

    function tick() {
      // Variable speed: slow at start and end, fast in middle
      let increment;
      if (current < 10)       increment = 0.4;
      else if (current < 40)  increment = 1.1;
      else if (current < 75)  increment = 0.9;
      else if (current < 90)  increment = 0.5;
      else if (current < 98)  increment = 0.25;
      else                    increment = 0.08;

      current = Math.min(current + increment, 100);
      const pct = Math.floor(current);

      document.getElementById('pct-display').innerHTML = pct + '<span>%</span>';
      document.getElementById('progress-fill').style.width = pct + '%';

      // Activate / complete steps
      for (let i = 0; i < STEPS; i++) {
        if (!stepsActive[i] && pct >= STEP_AT[i]) {
          stepsActive[i] = true;
          setStep(i, 'active');
        }
        if (!stepsDone[i] && pct >= STEP_DONE[i]) {
          stepsDone[i] = true;
          setStep(i, 'done');
        }
      }

      if (current < 100) {
        setTimeout(tick, 55);
      } else {
        // Small pause then redirect
        setTimeout(() => {
          window.location.href = `results.html?score=${score}&raw=${raw}&max=${max}&name=${encodeURIComponent(name)}`;
        }, 600);
      }
    }

    // Slight delay before starting
    setTimeout(tick, 400);
  </script>
</body>
</html>
